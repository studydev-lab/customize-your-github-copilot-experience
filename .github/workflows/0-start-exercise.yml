name: Step 0 # 실습 시작

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_1_FILE: ".github/steps/1-step.md"

jobs:
  start_exercise:
    if: |
      !github.event.repository.is_template
    name: 실습 시작
    uses: skills-kr/exercise-toolkit/.github/workflows/start-exercise.yml@kr-v0.6.0
    with:
      exercise-title: "GitHub Copilot 경험 커스터마이징"
      intro-message: "팀과 프로젝트에 맞게 GitHub Copilot을 커스터마이징하는 방법을 배워봅시다!"

  update_assignment_dates:
    name: config.json 과제 날짜 업데이트
    runs-on: ubuntu-latest
    needs: [start_exercise]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 과제 날짜 업데이트
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Helper function to get date with offset
            const getDate = (daysOffset) => {
              const date = new Date();
              date.setDate(date.getDate() + daysOffset);
              return date.toISOString().split('T')[0];
            };

            // Read and update config.json
            const config = JSON.parse(fs.readFileSync('config.json', 'utf8'));

            // Update assignment dates
            config.assignments[0].dueDate = getDate(-45);  // 45 days ago
            config.assignments[1].dueDate = getDate(-30);  // 30 days ago
            config.assignments[2].dueDate = getDate(-20);  // 20 days ago
            config.assignments[3].dueDate = getDate(14);   // 2 weeks ahead

            // Write updated config.json
            fs.writeFileSync('config.json', JSON.stringify(config, null, 2) + '\n');

      - name: 업데이트된 config.json 커밋
        uses: EndBug/add-and-commit@v9
        with:
          add: "config.json"
          message: "Update assignment due dates for exercise start"
          default_author: github_actions

  post_next_step_content:
    name: 다음 단계 내용 게시
    runs-on: ubuntu-latest
    needs: [start_exercise]
    env:
      ISSUE_NUMBER: ${{ needs.start_exercise.outputs.issue-number }}
      ISSUE_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v4
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 댓글 생성 - 단계 내용 추가
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_1_FILE }}
          vars: |
            full_repo_name: ${{ github.repository }}

      - name: 댓글 생성 - 진행 상황 확인 중
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: 다음 워크플로우 활성화
        run: |
          gh workflow enable "Step 1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workshop Tracker에 시작 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "sessionId": "'"$SESSION_ID"'",
              "type": "start",
              "step": 0,
              "description": "실습 시작",
              "username": "'"$GITHUB_ACTOR"'",
              "repo": "'"$GITHUB_REPOSITORY"'",
              "track": "'"$TRACK"'",
              "runId": "'"$GITHUB_RUN_ID"'"
            }' || true
